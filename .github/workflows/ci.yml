name: CI

on:
  push:
  pull_request:

env:
  NPM_VERSION: "11.6.2"

jobs:
  # -------------------------------------------------------------------------
  # Formatting check (Prettier)
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root deps
        run: npm install -g npm@${{ env.NPM_VERSION }} && npm ci

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Check e2e formatting
        run: npm run format:check

      - name: Check frontend formatting
        run: npm run format:check
        working-directory: frontend

  # -------------------------------------------------------------------------
  # End-to-end tests (Playwright + Anvil)
  # -------------------------------------------------------------------------
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install root deps
        run: npm install -g npm@${{ env.NPM_VERSION }} && npm ci

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Pre-compile contracts
        run: forge build

      - name: Run e2e tests
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Release — only on version tags, only if lint + e2e pass
  # -------------------------------------------------------------------------
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm install -g npm@${{ env.NPM_VERSION }} && npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          GIT_TAG: ${{ github.ref_name }}
          VITE_PINBO_CONTRACT_ADDRESS: "0xd142B29992Da1CEfB429e303500A90Bbe3e01118"
          VITE_CONTRACT_DEPLOY_BLOCK: "24664869"
          VITE_CHAIN_ID: "1"
          VITE_RPC_URL: "https://ethereum-rpc.publicnode.com"
          VITE_ENS_RPC: "https://1.rpc.thirdweb.com"
          VITE_WALLETCONNECT_PROJECT_ID: "fe9c622a7be4d07ef72cb54be56e1feb"

      - name: Archive build
        run: tar -czf pinbo-${{ github.ref_name }}.tar.gz -C frontend/build .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: pinbo-${{ github.ref_name }}.tar.gz
