name: Build Frontend

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_LOCAL_RPC_URL: ${{ vars.VITE_LOCAL_RPC_URL }}
          VITE_PINBO_CONTRACT_ADDRESS: ${{ vars.VITE_PINBO_CONTRACT_ADDRESS }}
          VITE_CONTRACT_DEPLOY_BLOCK: ${{ vars.VITE_CONTRACT_DEPLOY_BLOCK }}
          VITE_ENS_RPC: ${{ vars.VITE_ENS_RPC }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}

      - name: Archive build
        run: tar -czf pinbo-${{ github.event.inputs.tag || github.ref_name }}.tar.gz -C frontend/build .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: pinbo-${{ github.ref_name }}.tar.gz
